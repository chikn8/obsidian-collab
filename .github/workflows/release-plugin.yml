name: Release plugin

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release-plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            plugin/package-lock.json
            server/package-lock.json

      - name: Install plugin dependencies
        working-directory: plugin
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Verify release tag matches manifest
        run: |
          VERSION="$(node -p "require('./plugin/manifest.json').version")"
          PACKAGE_VERSION="$(node -p "require('./plugin/package.json').version")"
          MIN_APP_VERSION="$(node -p "require('./plugin/manifest.json').minAppVersion")"
          VERSIONS_MIN="$(node -p "require('./versions.json')[require('./plugin/manifest.json').version] || ''")"
          if [[ "$GITHUB_REF_NAME" != "$VERSION" ]]; then
            echo "Tag '$GITHUB_REF_NAME' must exactly match plugin/manifest.json version '$VERSION'." >&2
            exit 1
          fi
          if [[ "$PACKAGE_VERSION" != "$VERSION" ]]; then
            echo "plugin/package.json version '$PACKAGE_VERSION' must match manifest version '$VERSION'." >&2
            exit 1
          fi
          if [[ "$VERSIONS_MIN" != "$MIN_APP_VERSION" ]]; then
            echo "versions.json entry for '$VERSION' must equal minAppVersion '$MIN_APP_VERSION'." >&2
            exit 1
          fi

      - name: Release readiness
        run: node tools/release-readiness.mjs --quick

      - name: Create release assets
        run: |
          mkdir -p release
          cp plugin/main.js release/main.js
          cp plugin/manifest.json release/manifest.json
          cp plugin/styles.css release/styles.css

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release/main.js \
            release/manifest.json \
            release/styles.css \
            --title "$GITHUB_REF_NAME" \
            --notes "Obsidian Collab plugin release $GITHUB_REF_NAME"
